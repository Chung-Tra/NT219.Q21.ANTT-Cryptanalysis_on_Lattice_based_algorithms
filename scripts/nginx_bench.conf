# Template for WP4 nginx benchmark (placeholders filled by bench_tls_nginx.sh).
# Measurement-grade settings:
#   - daemon off            : foreground -> the bench script owns the PID
#   - ssl_session_cache off + ssl_session_tickets off : force FULL handshakes
#     (TLS 1.3 resumption would skip certificate transfer and bias latency)
#   - access_log off        : remove disk-write noise
#   - groups list goes through ssl_ecdh_curve -> SSL_CTX_set1_curves_list
#   - static file response  : 'return' needs the rewrite module (disabled)
# Directive semantics: https://nginx.org/en/docs/http/ngx_http_ssl_module.html
#   (PQC-through-ssl_ecdh_curve path confirmed in nginx issue #532)
# NOTE: keep everything in the default server block (nginx ticket #2542:
# ssl_ecdh_curve in non-default name-based servers is silently ignored).
worker_processes __WORKERS__;
daemon off;
error_log logs/error.log warn;
pid logs/nginx.pid;
events { worker_connections 1024; }
http {
  access_log off;
  server {
    listen __LISTEN__:__PORT__ ssl;  # __LISTEN__=0.0.0.0 cho LAN
    ssl_certificate     __CRT__;
    ssl_certificate_key __KEY__;
    ssl_protocols TLSv1.3;
    ssl_ecdh_curve __GROUPS__;
    ssl_session_cache off;
    ssl_session_tickets off;
    location / { root html; }
  }
}
